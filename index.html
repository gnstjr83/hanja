<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기본한자 1500자 암기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.screen {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}
h1 { text-align: center; font-size: 1.7rem; color: #1a237e; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 32px; }
.field { margin-bottom: 22px; }
.field > label {
  display: block; font-size: 0.85rem; color: #555;
  margin-bottom: 8px; font-weight: 600;
}
.range-row { display: flex; align-items: center; gap: 12px; }
.range-row input[type=number] {
  width: 90px; padding: 10px 12px;
  border: 2px solid #ddd; border-radius: 8px;
  font-size: 1rem; text-align: center; outline: none;
  transition: border-color .2s;
}
.range-row input[type=number]:focus { border-color: #3f51b5; }
.range-row .hint { font-size: 0.8rem; color: #aaa; }
.radio-group { display: flex; gap: 20px; }
.radio-group label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.95rem; color: #333; font-weight: normal; cursor: pointer;
}
.btn-primary {
  width: 100%; padding: 14px;
  background: #3f51b5; color: white;
  border: none; border-radius: 10px;
  font-size: 1.1rem; font-weight: 600;
  cursor: pointer; margin-top: 8px;
  transition: background .2s;
}
.btn-primary:hover { background: #303f9f; }
.btn-secondary {
  width: 100%; padding: 12px;
  background: white; color: #3f51b5;
  border: 2px solid #3f51b5; border-radius: 10px;
  font-size: 1rem; font-weight: 600;
  cursor: pointer; margin-top: 8px;
  transition: all .2s;
}
.btn-secondary:hover { background: #e8eaf6; }

/* 퀴즈 */
.progress-bar-wrap {
  background: #e8eaf6; border-radius: 99px;
  height: 8px; margin-bottom: 14px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: #3f51b5;
  border-radius: 99px; transition: width .3s;
}
.progress-text {
  display: flex; justify-content: space-between;
  font-size: 0.85rem; color: #888; margin-bottom: 28px;
}
.correct-count { color: #388e3c; font-weight: 700; }
.wrong-count   { color: #d32f2f; font-weight: 700; }
.hanja-display {
  text-align: center; font-size: 7rem; color: #1a237e;
  margin: 20px 0 28px; line-height: 1;
  min-height: 108px; display: flex;
  align-items: center; justify-content: center;
}
.prompt { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 14px; }
.input-row { display: flex; gap: 10px; margin-bottom: 14px; }
.input-row input[type=text] {
  flex: 1; padding: 14px 16px;
  border: 2px solid #ddd; border-radius: 10px;
  font-size: 1rem; outline: none;
  transition: border-color .2s;
}
.input-row input[type=text]:focus  { border-color: #3f51b5; }
.input-row input[type=text].ok     { border-color: #388e3c; background: #f1f8e9; }
.input-row input[type=text].fail   { border-color: #d32f2f; background: #ffebee; }
.btn-check {
  padding: 14px 22px;
  background: #3f51b5; color: white;
  border: none; border-radius: 10px;
  font-size: 1rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background .2s;
}
.btn-check:hover    { background: #303f9f; }
.btn-check:disabled { background: #b0bec5; cursor: default; }
.feedback {
  text-align: center; padding: 14px 18px;
  border-radius: 10px; font-size: 1rem;
  font-weight: 600; margin-bottom: 14px; line-height: 1.6;
}
.fb-ok   { background: #e8f5e9; color: #2e7d32; }
.fb-fail { background: #ffebee; color: #c62828; }
.hidden  { display: none !important; }
.btn-next {
  width: 100%; padding: 14px;
  background: #388e3c; color: white;
  border: none; border-radius: 10px;
  font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: background .2s;
}
.btn-next:hover { background: #2e7d32; }

/* 결과 */
.result-header { text-align: center; margin-bottom: 28px; }
.result-header h2 { font-size: 1.8rem; color: #1a237e; margin-bottom: 8px; }
.score { font-size: 2.5rem; font-weight: 700; color: #3f51b5; }
.result-grid { display: flex; gap: 12px; margin-bottom: 24px; }
.result-card { flex: 1; padding: 16px; border-radius: 10px; text-align: center; }
.result-card .lbl { font-size: 0.8rem; color: #666; margin-bottom: 4px; }
.result-card .val { font-size: 1.6rem; font-weight: 700; }
.rc-ok  { background: #e8f5e9; }  .rc-ok  .val { color: #2e7d32; }
.rc-ng  { background: #ffebee; }  .rc-ng  .val { color: #c62828; }
.rc-rt  { background: #e3f2fd; }  .rc-rt  .val { color: #1565c0; }
.wrong-section h3 { font-size: 1rem; color: #555; margin-bottom: 10px; }
.wrong-list {
  max-height: 240px; overflow-y: auto;
  border: 1px solid #eee; border-radius: 8px; margin-bottom: 16px;
}
.wrong-item {
  display: flex; align-items: flex-start;
  padding: 10px 14px; border-bottom: 1px solid #f5f5f5; gap: 12px;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-char { font-size: 1.5rem; color: #1a237e; min-width: 36px; text-align: center; }
.wrong-info { flex: 1; font-size: 0.88rem; }
.ans-correct { color: #2e7d32; font-weight: 600; }
.ans-mine    { color: #c62828; margin-top: 2px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn-primary, .btn-row .btn-secondary { margin-top: 0; }
</style>
</head>
<body>

<!-- 설정 화면 -->
<div id="S0" class="screen">
  <h1>기본한자 1500자</h1>
  <p class="subtitle">한자를 보고 뜻과 음을 입력하세요</p>
  <div class="field">
    <label>출제 범위</label>
    <div class="range-row">
      <input type="number" id="rStart" min="1" max="1500" value="1">
      <span style="color:#888">~</span>
      <input type="number" id="rEnd" min="1" max="1500" value="100">
      <span class="hint">/ 1500</span>
    </div>
  </div>
  <div class="field">
    <label>출제 순서</label>
    <div class="radio-group">
      <label><input type="radio" name="ord" value="seq" checked> 순서대로</label>
      <label><input type="radio" name="ord" value="rnd"> 랜덤</label>
    </div>
  </div>
  <button class="btn-primary" onclick="startQuiz()">시작하기</button>
</div>

<!-- 퀴즈 화면 -->
<div id="S1" class="screen hidden">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="pBar" style="width:0%"></div>
  </div>
  <div class="progress-text">
    <span id="pText">1 / 100</span>
    <span>
      정답 <span class="correct-count" id="cCnt">0</span>
      &nbsp;오답 <span class="wrong-count" id="wCnt">0</span>
    </span>
  </div>
  <div class="hanja-display" id="hChar"></div>
  <p class="prompt">이 한자의 뜻과 음은? &nbsp;(예: 집 가)</p>
  <div class="input-row">
    <input type="text" id="ans" placeholder="뜻 음" autocomplete="off" spellcheck="false">
    <button class="btn-check" id="chkBtn" onclick="check()">확인</button>
  </div>
  <div id="fb" class="feedback hidden"></div>
  <button id="nxtBtn" class="btn-next hidden" onclick="next()">다음 →</button>
</div>

<!-- 결과 화면 -->
<div id="S2" class="screen hidden">
  <div class="result-header">
    <h2>완료!</h2>
    <div class="score" id="scoreEl"></div>
  </div>
  <div class="result-grid">
    <div class="result-card rc-ok"><div class="lbl">정답</div><div class="val" id="rOk">0</div></div>
    <div class="result-card rc-ng"><div class="lbl">오답</div><div class="val" id="rNg">0</div></div>
    <div class="result-card rc-rt"><div class="lbl">정답률</div><div class="val" id="rRt">0%</div></div>
  </div>
  <div id="wSection" style="display:none">
    <div class="wrong-section"><h3>오답 목록</h3></div>
    <div class="wrong-list" id="wList"></div>
  </div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="goHome()">처음으로</button>
    <button class="btn-primary" id="rWrong" onclick="retryWrong()" style="display:none">오답 재도전</button>
    <button class="btn-primary" onclick="startQuiz()">다시 시작</button>
  </div>
</div>

let quiz=[], idx=0, ok=0, ng=0, wrongs=[], done=false;

function norm(s){ return s.trim().replace(/\s+/g,' '); }
function matches(inp, entries){ return entries.some(e=>norm(e)===norm(inp)); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function show(id){ ['S0','S1','S2'].forEach(s=>{ document.getElementById(s).classList.add('hidden'); }); document.getElementById(id).classList.remove('hidden'); }

function startQuiz(list){
  if(!list){
    const s=Math.max(1,Math.min(parseInt(document.getElementById('rStart').value)||1,1500));
    const e=Math.max(s,Math.min(parseInt(document.getElementById('rEnd').value)||100,1500));
    const ord=document.querySelector('input[name=ord]:checked').value;
    quiz=HANJA.filter(h=>h.id>=s&&h.id<=e);
    if(ord==='rnd') shuffle(quiz);
  } else {
    quiz=list;
  }
  if(!quiz.length){ alert('범위에 데이터가 없습니다.'); return; }
  idx=0; ok=0; ng=0; wrongs=[];
  show('S1');
  render();
}

function render(){
  done=false;
  const item=quiz[idx], total=quiz.length;
  document.getElementById('hChar').textContent=item.char;
  document.getElementById('pBar').style.width=((idx/total)*100)+'%';
  document.getElementById('pText').textContent=(idx+1)+' / '+total;
  document.getElementById('cCnt').textContent=ok;
  document.getElementById('wCnt').textContent=ng;
  const a=document.getElementById('ans');
  a.value=''; a.className=''; a.disabled=false; a.focus();
  document.getElementById('fb').className='feedback hidden';
  document.getElementById('nxtBtn').className='btn-next hidden';
  document.getElementById('chkBtn').disabled=false;
}

function check(){
  if(done) return;
  const a=document.getElementById('ans'), inp=a.value.trim();
  if(!inp){ a.focus(); return; }
  const item=quiz[idx];
  const correct=matches(inp, item.entries);
  done=true;
  document.getElementById('chkBtn').disabled=true;
  a.disabled=true;
  const fb=document.getElementById('fb');
  if(correct){
    ok++;
    a.className='ok';
    fb.className='feedback fb-ok';
    fb.innerHTML='&#10003; 정답!';
  } else {
    ng++;
    wrongs.push({item,my:inp});
    a.className='fail';
    fb.className='feedback fb-fail';
    fb.innerHTML='&#10007; 오답<br><small style="font-weight:normal">정답: '+item.entries.join(' &nbsp;/&nbsp; ')+'</small>';
  }
  document.getElementById('cCnt').textContent=ok;
  document.getElementById('wCnt').textContent=ng;
  const nb=document.getElementById('nxtBtn');
  nb.textContent=(idx+1<quiz.length)?'다음 →':'결과 보기';
  nb.className='btn-next';
}

function next(){
  idx++;
  if(idx>=quiz.length) showResult();
  else render();
}

function showResult(){
  show('S2');
  const total=quiz.length, rate=Math.round(ok/total*100);
  document.getElementById('scoreEl').textContent=ok+' / '+total;
  document.getElementById('rOk').textContent=ok;
  document.getElementById('rNg').textContent=ng;
  document.getElementById('rRt').textContent=rate+'%';
  if(wrongs.length){
    document.getElementById('wSection').style.display='';
    document.getElementById('rWrong').style.display='';
    document.getElementById('wList').innerHTML=wrongs.map(w=>
      '<div class="wrong-item">'+
        '<div class="wrong-char">'+w.item.char+'</div>'+
        '<div class="wrong-info">'+
          '<div class="ans-correct">정답: '+w.item.entries.join(' / ')+'</div>'+
          (w.my?'<div class="ans-mine">입력: '+w.my+'</div>':'')+
        '</div>'+
      '</div>'
    ).join('');
  } else {
    document.getElementById('wSection').style.display='none';
    document.getElementById('rWrong').style.display='none';
  }
}

function goHome(){
  show('S0');
}

function retryWrong(){
  const list=wrongs.map(w=>w.item);
  ok=0; ng=0; wrongs=[]; idx=0;
  startQuiz(list);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const q=document.getElementById('S1');
    if(!q.classList.contains('hidden')){
      if(!done) check(); else next();
    }
  }
});
</script>
